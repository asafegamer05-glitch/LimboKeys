<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; }
body {
    background: #1a1a2e;
    display: flex; align-items: center; justify-content: center;
    height: 100vh; overflow: hidden;
    transition: background 0.08s;
}
#key {
    max-width: 85%; max-height: 85%;
    object-fit: contain; transition: filter 0.15s;
}
.can-click { cursor: pointer; }
.can-click:hover { filter: brightness(1.5) drop-shadow(0 0 12px #fff); }
</style>
</head>
<body>
<img id="key">
<script>
const { ipcRenderer } = require('electron');
const img = document.getElementById('key');
let myId = -1;

ipcRenderer.on('init', (e, d) => { myId = d.id; img.src = d.image; });
ipcRenderer.on('change-img', (e, src) => { img.src = src; });
ipcRenderer.on('flash', () => {
    document.body.style.background = '#fff';
    setTimeout(() => { document.body.style.background = '#1a1a2e'; }, 80);
});
ipcRenderer.on('clickable', () => {
    img.classList.add('can-click');
    img.onclick = () => ipcRenderer.send('clicked', myId);
});
ipcRenderer.on('result', (e, won) => {
    document.body.style.background = won ? '#0a3d0a' : '#3d0a0a';
});
</script>
</body>
</html>
